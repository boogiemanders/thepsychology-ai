name: Debug Secrets

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Check secret lengths (no values printed)
        env:
          URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND: ${{ secrets.RESEND_API_KEY }}
          NOTIFY: ${{ secrets.NOTIFY_EMAIL_FROM }}
          HOOK: ${{ secrets.SLACK_WEBHOOK_FEEDBACK }}
        run: |
          echo "URL bytes:    ${#URL}"
          echo "KEY bytes:    ${#KEY}"
          echo "RESEND bytes: ${#RESEND}"
          echo "NOTIFY bytes: ${#NOTIFY}"
          echo "HOOK bytes:   ${#HOOK}"
