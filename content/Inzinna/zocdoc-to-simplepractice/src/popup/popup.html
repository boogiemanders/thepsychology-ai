<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>ZocDoc → SimplePractice</title>
</head>
<body>
  <div class="popup">
    <div class="header">
      <h1 class="title">ZocDoc → SP</h1>
      <button id="btn-toggle-btns" class="btn-icon" title="Hide/Show page buttons">&#128065;</button>
      <button id="btn-settings" class="btn-icon" title="Settings">&#9881;</button>
    </div>

    <div id="provider-badge" class="provider-badge"></div>

    <!-- Empty state -->
    <div id="empty-state" class="empty-state">
      <p>No client captured yet.</p>
      <p class="hint">Go to ZocDoc and click "Capture Client"</p>
    </div>

    <!-- Client info -->
    <div id="client-info" class="client-info" style="display: none;">
      <div class="client-name" id="client-name"></div>
      <div class="client-meta" id="client-meta"></div>

      <div class="checklist">
        <div class="check-item" id="check-client">
          <span class="check-icon">○</span>
          <span>Client Created</span>
        </div>
        <div class="check-item" id="check-appointment">
          <span class="check-icon">○</span>
          <span>Appointment Set</span>
        </div>
        <div class="check-item" id="check-insurance">
          <span class="check-icon">○</span>
          <span>Insurance Added</span>
        </div>
        <div class="check-item" id="check-vob">
          <span class="check-icon">○</span>
          <span>VOB Email Sent</span>
        </div>
      </div>

      <div class="actions">
        <button id="btn-vob" class="btn btn-primary">Send VOB Email</button>
        <button id="btn-clear" class="btn btn-secondary">Clear</button>
      </div>
    </div>

    <!-- Settings panel -->
    <div id="settings-panel" class="settings-panel" style="display: none;">
      <h2 class="section-title">Provider</h2>
      <label>First Name<input id="pref-firstName" type="text" class="input"></label>
      <label>Last Name<input id="pref-lastName" type="text" class="input"></label>
      <label>Default Location
        <select id="pref-location" class="input">
          <option value="Video Office">Video Office</option>
          <option value="New Rochelle">New Rochelle</option>
          <option value="Manhattan">Manhattan</option>
        </select>
      </label>
      <label>First Visit CPT Code<input id="pref-firstCPT" type="text" class="input"></label>
      <label>Follow-up CPT Code<input id="pref-followUpCPT" type="text" class="input"></label>

      <h2 class="section-title">VOB Email</h2>
      <label>To (comma-separated)<input id="pref-vobTo" type="text" class="input"></label>
      <label>CC (comma-separated)<input id="pref-vobCc" type="text" class="input"></label>
      <label>Signature<textarea id="pref-signature" class="input textarea" rows="5"></textarea></label>

      <div class="actions">
        <button id="btn-save-prefs" class="btn btn-primary">Save</button>
        <button id="btn-cancel-prefs" class="btn btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
