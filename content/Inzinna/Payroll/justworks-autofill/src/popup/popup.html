<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <h1>Payroll Autofill</h1>
    <p class="subtitle">SimplePractice CSV &rarr; JustWorks</p>

    <div id="upload-section">
      <label for="csv-input" class="upload-label">
        <span class="upload-icon">+</span>
        <span>Drop CSV or click to upload</span>
      </label>
      <input type="file" id="csv-input" accept=".csv" />
    </div>

    <div id="roster-section">
      <div class="roster-controls">
        <label for="roster-input" class="upload-label upload-label-secondary">
          <span class="upload-icon">+</span>
          <span id="roster-upload-text">Drop client roster CSV (optional)</span>
        </label>
        <input type="file" id="roster-input" accept=".csv" />
        <button id="roster-toggle" class="btn-small hidden">Show roster</button>
        <button id="roster-clear" class="btn-small hidden" title="Remove saved roster">Clear roster</button>
      </div>
      <div id="roster-body" class="hidden">
        <input type="search" id="roster-search" placeholder="Search by client or insurance..." />
        <div id="roster-list"></div>
      </div>
    </div>

    <div id="results-section" class="hidden">
      <div id="summary-header">
        <h2>Pay Period Summary</h2>
        <div class="header-actions">
          <button id="wipe-all-btn" class="btn-small" title="Wipe all saved payroll + insurance data from this browser">Clear saved data</button>
          <button id="clear-btn" class="btn-small">Clear</button>
        </div>
      </div>

      <div id="insurance-stat" class="insurance-stat hidden"></div>

      <div id="clinician-list"></div>

      <div id="bret-section" class="bret-calc hidden">
        <h3>Bret Boatwright -- Full Calc</h3>
        <div id="bret-details"></div>
      </div>

      <div class="actions">
        <button id="send-to-justworks" class="btn-primary">
          Send to JustWorks
        </button>
        <button id="download-jw-csv" class="btn-secondary">
          JustWorks CSV
        </button>
        <button id="download-xlsx" class="btn-secondary">
          Excel
        </button>
        <button id="copy-json" class="btn-secondary">
          Copy
        </button>
      </div>
    </div>

    <div id="status" class="hidden"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
