<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=960, height=720" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 960px;
        height: 720px;
        overflow: hidden;
        background: #18181b;
      }
      .ln {
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      /* pathLength="100" on every path lets dashoffset draw-on without
         measuring real path lengths. */
      .draw {
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
      }
      .eye,
      #mouth {
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="4.5"
      data-width="960"
      data-height="720"
    >
      <div
        id="scene"
        class="clip"
        data-start="0"
        data-duration="4.5"
        data-track-index="1"
      >
        <svg id="art" width="960" height="720" viewBox="0 0 960 720">
          <!-- zoom wrapper: scales the sketch to fill the 4:3 panel; GSAP
               never touches this group (the drift tween targets #art) -->
          <g id="zoom" transform="translate(-161 -177) scale(1.35)">
          <!-- floor -->
          <path
            id="floor"
            class="ln draw"
            pathLength="100"
            d="M 160 620 C 350 612, 640 612, 830 620"
            stroke="#71717a"
            stroke-width="3"
          />
          <!-- low wooden chair (left, facing right): back post, top rail,
               seat plank, front leg, stretcher -->
          <path
            class="ln draw chair"
            pathLength="100"
            d="M 310 620 C 305 545, 302 462, 302 398"
            stroke="#a1a1aa"
            stroke-width="3.5"
          />
          <path
            class="ln draw chair"
            pathLength="100"
            d="M 288 398 C 302 390, 324 390, 338 396"
            stroke="#a1a1aa"
            stroke-width="3.5"
          />
          <path
            class="ln draw chair"
            pathLength="100"
            d="M 296 502 C 340 494, 430 492, 478 500"
            stroke="#a1a1aa"
            stroke-width="3.5"
          />
          <path
            class="ln draw chair"
            pathLength="100"
            d="M 470 502 C 474 542, 477 582, 478 620"
            stroke="#a1a1aa"
            stroke-width="3.5"
          />
          <!-- slumped figure: head tilted back over the low chair back, spine
               sagging to the seat, legs stretched long along the floor -->
          <g id="headGroup">
            <circle
              class="ln draw person"
              pathLength="100"
              cx="308"
              cy="352"
              r="27"
              stroke="#fafafa"
              stroke-width="4"
            />
          </g>
          <path
            class="ln draw person"
            pathLength="100"
            d="M 326 374 C 352 430, 380 468, 412 494"
            stroke="#fafafa"
            stroke-width="5"
          />
          <!-- near leg -->
          <path
            class="ln draw person"
            pathLength="100"
            d="M 425 492 C 470 508, 520 526, 558 540"
            stroke="#fafafa"
            stroke-width="4"
          />
          <path
            class="ln draw person"
            pathLength="100"
            d="M 558 540 C 600 562, 646 588, 678 606"
            stroke="#fafafa"
            stroke-width="4"
          />
          <path
            class="ln draw person"
            pathLength="100"
            d="M 678 606 C 690 610, 700 605, 704 594"
            stroke="#fafafa"
            stroke-width="4"
          />
          <!-- far leg, shallower angle -->
          <path
            class="ln draw person"
            pathLength="100"
            d="M 416 496 C 452 518, 488 544, 516 568"
            stroke="#fafafa"
            stroke-width="4"
          />
          <path
            class="ln draw person"
            pathLength="100"
            d="M 516 568 C 548 588, 580 602, 610 614"
            stroke="#fafafa"
            stroke-width="4"
          />
          <path
            class="ln draw person"
            pathLength="100"
            d="M 610 614 C 621 618, 631 615, 636 605"
            stroke="#fafafa"
            stroke-width="4"
          />
          <!-- arms reaching forward, holding the detached face -->
          <path
            class="ln draw person"
            pathLength="100"
            d="M 344 412 C 392 412, 448 402, 504 384"
            stroke="#fafafa"
            stroke-width="4"
          />
          <path
            class="ln draw person"
            pathLength="100"
            d="M 504 384 C 512 376, 520 368, 530 361"
            stroke="#fafafa"
            stroke-width="4"
          />
          <path
            class="ln draw person"
            pathLength="100"
            d="M 350 428 C 398 436, 452 430, 506 412"
            stroke="#fafafa"
            stroke-width="4"
          />
          <path
            class="ln draw person"
            pathLength="100"
            d="M 506 412 C 518 418, 532 422, 546 424"
            stroke="#fafafa"
            stroke-width="4"
          />
          <!-- the held face (accent): the punchline element -->
          <g id="heldFace">
            <circle
              id="faceCircle"
              class="ln draw"
              pathLength="100"
              cx="565"
              cy="390"
              r="42"
              stroke="#d97757"
              stroke-width="4.5"
            />
            <circle class="eye" cx="550" cy="380" r="5" fill="#d97757" />
            <circle class="eye" cx="582" cy="380" r="5" fill="#d97757" />
            <path
              id="mouth"
              class="ln"
              pathLength="100"
              d="M 548 406 L 584 406"
              stroke="#d97757"
              stroke-width="4.5"
            />
          </g>
          <!-- open book, tented, lands flat over the tilted-back face -->
          <g id="book">
            <path
              class="ln draw book-line"
              pathLength="100"
              d="M 246 360 C 258 332, 282 317, 312 314"
              stroke="#fafafa"
              stroke-width="4"
            />
            <path
              class="ln draw book-line"
              pathLength="100"
              d="M 312 314 C 340 318, 360 333, 374 356"
              stroke="#fafafa"
              stroke-width="4"
            />
            <path
              class="ln draw book-line"
              pathLength="100"
              d="M 256 362 C 268 338, 288 324, 313 322"
              stroke="#fafafa"
              stroke-width="3"
            />
            <path
              class="ln draw book-line"
              pathLength="100"
              d="M 313 322 C 336 326, 354 339, 366 358"
              stroke="#fafafa"
              stroke-width="3"
            />
            <path
              class="ln draw book-line"
              pathLength="100"
              d="M 312 314 L 313 323"
              stroke="#fafafa"
              stroke-width="3"
            />
          </g>
          </g>
        </svg>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Sketch-in: floor, chair, then the slumped figure.
      tl.to("#floor", { strokeDashoffset: 0, duration: 0.45, ease: "power2.inOut" }, 0.05);
      tl.to(".chair", { strokeDashoffset: 0, duration: 0.45, ease: "power2.inOut", stagger: 0.06 }, 0.12);
      tl.to(".person", { strokeDashoffset: 0, duration: 0.5, ease: "power2.inOut", stagger: 0.06 }, 0.5);

      // The detached face arrives blank: outline, then open eyes. No mouth yet.
      tl.to("#faceCircle", { strokeDashoffset: 0, duration: 0.45, ease: "power2.inOut" }, 1.0);
      tl.to(".eye", { opacity: 1, duration: 0.25, ease: "power2.out", stagger: 0.08 }, 1.35);

      // Book sketches in floating above, then settles onto the face. Calm
      // drop, no bounce; the head dips a touch under the weight. fromTo with
      // default immediateRender pins the float position from frame 0.
      tl.to(".book-line", { strokeDashoffset: 0, duration: 0.4, ease: "power2.inOut", stagger: 0.05 }, 1.45);
      tl.fromTo("#book", { y: -80 }, { y: 0, duration: 0.45, ease: "power2.inOut" }, 2.15);
      tl.to("#headGroup", { y: 3, duration: 0.12, ease: "power2.out" }, 2.52);
      tl.to("#headGroup", { y: 0, duration: 0.4, ease: "power2.out" }, 2.66);

      // Deadpan punchline: the held face draws a flat mouth, then blinks once.
      tl.set("#mouth", { opacity: 1 }, 2.95);
      tl.to("#mouth", { strokeDashoffset: 0, duration: 0.3, ease: "power2.out" }, 2.95);
      tl.to(".eye", { scaleY: 0.15, svgOrigin: "0 380", duration: 0.09, ease: "power2.in" }, 3.55);
      tl.to(".eye", { scaleY: 1, svgOrigin: "0 380", duration: 0.14, ease: "power2.out" }, 3.66);

      // Calm hold: barely-there drift so the tail never feels frozen.
      tl.to("#art", { scale: 1.015, duration: 2.4, ease: "sine.inOut", transformOrigin: "50% 55%" }, 2.1);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
