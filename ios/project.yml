# XcodeGen project spec — regenerate EPPPStudy.xcodeproj from this file.
#
# Install:  brew install xcodegen
# Run:      cd ios && xcodegen generate
# Open:     open EPPPStudy.xcodeproj
#
# The generated .xcodeproj is gitignored — this file is the source of truth.

name: EPPPStudy
options:
  bundleIdPrefix: ai.thepsychology
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true
  xcodeVersion: "26.3"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: TMSBWAXF25
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOL_EXTENSIONS: YES

# =============================================================================
# Targets
# =============================================================================
targets:

  # -------------------------------------------------------------------------
  # Main iOS App
  # -------------------------------------------------------------------------
  EPPPStudy:
    type: application
    platform: iOS
    bundleId: ai.thepsychology.eppp
    sources:
      - path: EPPPStudy
        excludes:
          - "Widget/**"            # Widget lives in its own target
          - "Info.plist"           # Provided via settings below
      - path: EPPPStudy/Widget/WidgetDataProvider.swift  # Shared: main app writes widget data
    resources:
      - path: EPPPStudy/Resources
        optional: true
      - path: ../public/priority-config.json
        optional: true             # Bundled so on-device priority engine works offline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.thepsychology.eppp
        INFOPLIST_FILE: EPPPStudy/Info.plist
        CODE_SIGN_ENTITLEMENTS: EPPPStudy/EPPPStudy.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: EPPPStudyWidget
    preBuildScripts:
      - name: Export priority-config.json
        script: |
          cd "$SRCROOT/.."
          if [ -f scripts/export-priority-config.mjs ]; then
            node scripts/export-priority-config.mjs || echo "[warn] priority-config export failed — build continues"
          fi
        basedOnDependencyAnalysis: false

  # -------------------------------------------------------------------------
  # Widget Extension
  # -------------------------------------------------------------------------
  EPPPStudyWidget:
    type: app-extension
    platform: iOS
    bundleId: ai.thepsychology.eppp.widget
    sources:
      - path: EPPPStudy/Widget
      # Widget needs to share models + the LocalStore that reads App Group data.
      # Keep this list tight — only what the widget actually imports.
      - path: EPPPStudy/Models
      - path: EPPPStudy/Utilities/Constants.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.thepsychology.eppp.widget
        INFOPLIST_FILE: EPPPStudy/Widget/Info.plist
        CODE_SIGN_ENTITLEMENTS: EPPPStudy/Widget/EPPPStudyWidget.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        SKIP_INSTALL: YES
